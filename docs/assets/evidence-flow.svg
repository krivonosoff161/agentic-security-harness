<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Security Harness evidence flow</title>
  <desc id="desc">Synthetic scenarios are replayed through vulnerable and protected flows, then validated as traces, scorecards, metrics, and conservative claims.</desc>
  <rect width="1120" height="360" fill="#0f172a"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="48" y="48" fill="#f8fafc" font-size="28" font-weight="700">Evidence flow</text>
    <text x="48" y="78" fill="#cbd5e1" font-size="15">Trace-first benchmark artifacts, not model leaderboard claims</text>

    <g transform="translate(48 118)">
      <rect width="198" height="94" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <text x="20" y="34" fill="#e0f2fe" font-size="18" font-weight="700">Synthetic cases</text>
      <text x="20" y="60" fill="#cbd5e1" font-size="13">24 corpus patterns</text>
      <text x="20" y="78" fill="#cbd5e1" font-size="13">campaign rows + canaries</text>
    </g>

    <g transform="translate(324 76)">
      <rect width="210" height="82" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
      <text x="20" y="32" fill="#ffedd5" font-size="18" font-weight="700">Naive / vulnerable</text>
      <text x="20" y="58" fill="#cbd5e1" font-size="13">modeled failures allowed</text>
    </g>
    <g transform="translate(324 196)">
      <rect width="210" height="82" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
      <text x="20" y="32" fill="#dcfce7" font-size="18" font-weight="700">Bounded / protected</text>
      <text x="20" y="58" fill="#cbd5e1" font-size="13">contracts block or pass</text>
    </g>

    <g transform="translate(612 118)">
      <rect width="205" height="94" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
      <text x="20" y="34" fill="#ede9fe" font-size="18" font-weight="700">Validated artifacts</text>
      <text x="20" y="60" fill="#cbd5e1" font-size="13">traces + scorecards</text>
      <text x="20" y="78" fill="#cbd5e1" font-size="13">hashes + reports</text>
    </g>

    <g transform="translate(892 118)">
      <rect width="180" height="94" rx="10" fill="#1e293b" stroke="#facc15" stroke-width="2"/>
      <text x="20" y="34" fill="#fef9c3" font-size="18" font-weight="700">Public claim</text>
      <text x="20" y="60" fill="#cbd5e1" font-size="13">conservative summary</text>
      <text x="20" y="78" fill="#cbd5e1" font-size="13">explicit non-claims</text>
    </g>

    <path d="M250 164 L314 118" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M250 166 L314 236" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M538 118 L602 164" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M538 236 L602 166" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M820 165 L882 165" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <g transform="translate(72 284)">
      <rect width="976" height="44" rx="8" fill="#111827" stroke="#334155"/>
      <text x="18" y="28" fill="#cbd5e1" font-size="14">Current public headline: deterministic comparison 24 modeled findings -> 0; local-model campaigns are sanitized evidence-quality snapshots, not safety guarantees.</text>
    </g>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
