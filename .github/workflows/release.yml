name: Release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Verify release ref and version identity
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", tag) is None:
              raise SystemExit(f"release tag is not canonical vMAJOR.MINOR.PATCH: {tag!r}")
          project_version = tomllib.loads(Path("pyproject.toml").read_text("utf-8"))["project"]["version"]
          version_text = Path("src/agentic_security_harness/version.py").read_text("utf-8")
          match = re.search(r'^__version__ = "([^"]+)"$', version_text, re.MULTILINE)
          if match is None:
              raise SystemExit("package __version__ is missing")
          if tag != f"v{project_version}" or match.group(1) != project_version:
              raise SystemExit(
                  f"release identity mismatch: tag={tag!r}, project={project_version!r}, "
                  f"package={match.group(1)!r}"
              )
          changelog = Path("CHANGELOG.md").read_text("utf-8")
          if f"## [{project_version}] - " not in changelog:
              raise SystemExit(f"CHANGELOG has no dated release section for {project_version}")
          PY

      - name: Install locked verification and build dependencies
        run: |
          python -m pip install --require-hashes -r requirements/dev.txt
          python -m pip install --require-hashes -r requirements/build.txt

      - name: Run release verification gates
        env:
          PYTHONPATH: src
        run: |
          python -m pytest
          python -m ruff check .
          python -m mypy src tests tools
          python -m agentic_security_harness.cli validate examples/

      - name: Build package
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          for output in dist reproducibility-check; do
            python -m build --no-isolation --outdir "$output"
            python tools/normalize_sdist.py "$output"/*.tar.gz --epoch "$SOURCE_DATE_EPOCH"
          done
          cmp dist/*.tar.gz reproducibility-check/*.tar.gz
          cmp dist/*.whl reproducibility-check/*.whl
          rm -rf reproducibility-check

      - name: Smoke installed sdist and wheel
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python -m pip install --require-hashes -r requirements/runtime.txt
          python -m pip install --no-build-isolation --no-deps --force-reinstall dist/*.tar.gz
          ash --help
          python -m pip install --no-deps --force-reinstall dist/*.whl
          python -c "import os; import agentic_security_harness as ash; assert f'v{ash.__version__}' == os.environ['RELEASE_TAG']"
          ash --help
          ash validate examples/

      - name: Write unsigned artifact checksums
        run: cd dist && sha256sum *.tar.gz *.whl > SHA256SUMS

      - name: Attest exact release subjects
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl
            dist/SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-dist-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  verify-provenance:
    name: Verify release provenance
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      attestations: read
      contents: read
    steps:
      - name: Check out verification policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download exact release subjects
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist-${{ github.ref_name }}
          path: dist

      - name: Verify signer, subject, source, and SLSA policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for artifact in dist/*.tar.gz dist/*.whl dist/SHA256SUMS; do
            policy_json="$RUNNER_TEMP/$(basename "$artifact").attestation.json"
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA" \
              --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
              --predicate-type "https://slsa.dev/provenance/v1" \
              --deny-self-hosted-runners \
              --format json > "$policy_json"
            PYTHONPATH=src python -m agentic_security_harness.attestation_policy \
              --artifact "$artifact" \
              --verification-json "$policy_json" \
              --repository "$GITHUB_REPOSITORY" \
              --workflow-path ".github/workflows/release.yml" \
              --source-ref "$GITHUB_REF" \
              --source-digest "$GITHUB_SHA"
          done
