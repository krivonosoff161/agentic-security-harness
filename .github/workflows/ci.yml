name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        # Back the cross-platform claim with one Windows job (kept lightweight).
        include:
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check whitespace and conflict markers
        run: git diff --check

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy src tests

      - name: Validate committed benchmark artifacts
        run: ash validate examples/

  package:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke installed wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -c "import importlib.resources as r; import agentic_security_harness as ash; assert r.files('agentic_security_harness').joinpath('py.typed').is_file(); print(ash.__version__)"
          ash --help
          ash validate examples/
