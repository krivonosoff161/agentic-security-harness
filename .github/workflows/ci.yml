name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        # Back the cross-platform claim with one Windows job (kept lightweight).
        include:
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check whitespace and conflict markers
        run: git diff --check

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install locked dev dependencies
        run: python -m pip install --require-hashes -r requirements/dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy src tests

      - name: Validate committed benchmark artifacts
        run: python -m agentic_security_harness.cli validate examples/

  package:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install locked build dependencies
        run: python -m pip install --require-hashes -r requirements/build.txt

      - name: Build sdist and wheel
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          for output in dist reproducibility-check; do
            python -m build --no-isolation --outdir "$output"
            python tools/normalize_sdist.py "$output"/*.tar.gz --epoch "$SOURCE_DATE_EPOCH"
          done
          cmp dist/*.tar.gz reproducibility-check/*.tar.gz
          cmp dist/*.whl reproducibility-check/*.whl
          rm -rf reproducibility-check

      - name: Smoke installed wheel
        run: |
          python -m pip install --require-hashes -r requirements/runtime.txt
          python -m pip install --no-deps --force-reinstall dist/*.whl
          python -c "import importlib.resources as r; import agentic_security_harness as ash; assert r.files('agentic_security_harness').joinpath('py.typed').is_file(); print(ash.__version__)"
          ash --help
          ash validate examples/
