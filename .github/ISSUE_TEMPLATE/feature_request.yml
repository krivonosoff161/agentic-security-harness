name: Feature request
description: Propose a bounded feature or documentation improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What workflow or reviewer need does this support?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      description: Keep current-vs-planned behavior explicit.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation / positioning
        - Benchmark methodology
        - Reporting / validation
        - Target adapter
        - CLI / developer experience
        - CI / packaging
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and non-goals
      description: What should this not imply or not build?
    validations:
      required: true
