name: Bug report
description: Report a reproducible problem in the harness, CLI, docs, or artifacts.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep examples sanitized. Do not include real secrets, private prompts, or third-party target data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.13.0 or git SHA"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, install method"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Commands and sanitized inputs needed to reproduce.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Relevant artifacts
      description: Paste sanitized snippets or link to a public run directory. Do not include secrets.
